<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" fill="none">
  <!-- Glow backdrop -->
  <ellipse cx="240" cy="420" rx="180" ry="40" fill="url(#bgGlow)" opacity="0.6"/>
  
  <!-- Floating card 1 - top left -->
  <g transform="translate(20,60)" class="float-card-1">
    <rect width="130" height="64" rx="16" fill="#6366f1" opacity="0.12"/>
    <rect width="130" height="64" rx="16" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1" fill="none"/>
    <rect x="14" y="14" width="8" height="8" rx="2" fill="#818cf8"/>
    <rect x="28" y="15" width="60" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
    <rect x="28" y="27" width="40" height="4" rx="2" fill="#818cf8" opacity="0.3"/>
    <rect x="14" y="38" width="102" height="16" rx="8" fill="#6366f1" opacity="0.5"/>
    <text x="65" y="50" text-anchor="middle" fill="white" font-size="8" font-family="Inter,sans-serif" font-weight="600" opacity="0.9">96% on Maths Test!</text>
  </g>

  <!-- Floating card 2 - top right -->
  <g transform="translate(310,40)" class="float-card-2">
    <rect width="130" height="56" rx="14" fill="#8b5cf6" opacity="0.12"/>
    <rect width="130" height="56" rx="14" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1" fill="none"/>
    <circle cx="22" cy="28" r="12" fill="#7c3aed" opacity="0.4"/>
    <text x="22" y="32" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif">🧠</text>
    <rect x="42" y="16" width="72" height="6" rx="3" fill="#a78bfa" opacity="0.6"/>
    <rect x="42" y="28" width="50" height="4" rx="2" fill="#a78bfa" opacity="0.3"/>
    <rect x="42" y="38" width="65" height="4" rx="2" fill="#a78bfa" opacity="0.2"/>
  </g>

  <!-- Main device / screen mockup -->
  <g transform="translate(80,110)">
    <!-- Device shadow -->
    <ellipse cx="160" cy="290" rx="120" ry="12" fill="#6366f1" opacity="0.15"/>
    <!-- Device body -->
    <rect x="10" y="0" width="300" height="240" rx="20" fill="url(#deviceGrad)"/>
    <rect x="10" y="0" width="300" height="240" rx="20" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5" fill="none"/>
    <!-- Screen content -->
    <rect x="24" y="14" width="272" height="212" rx="12" fill="#0f172a" opacity="0.8"/>
    <!-- Topbar dots -->
    <circle cx="38" cy="26" r="4" fill="#ef4444" opacity="0.7"/>
    <circle cx="52" cy="26" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="66" cy="26" r="4" fill="#10b981" opacity="0.7"/>
    <!-- Text lines -->
    <rect x="38" y="44" width="110" height="8" rx="4" fill="#818cf8" opacity="0.8"/>
    <rect x="38" y="58" width="80" height="5" rx="2.5" fill="#64748b" opacity="0.6"/>
    <!-- Code-like lines -->
    <rect x="38" y="78" width="60" height="4" rx="2" fill="#6366f1" opacity="0.5"/>
    <rect x="104" y="78" width="90" height="4" rx="2" fill="#10b981" opacity="0.5"/>
    <rect x="38" y="88" width="40" height="4" rx="2" fill="#f59e0b" opacity="0.4"/>
    <rect x="84" y="88" width="70" height="4" rx="2" fill="#64748b" opacity="0.4"/>
    <rect x="38" y="98" width="100" height="4" rx="2" fill="#818cf8" opacity="0.3"/>
    <!-- Progress bar -->
    <rect x="38" y="116" width="220" height="6" rx="3" fill="#1e293b"/>
    <rect x="38" y="116" width="154" height="6" rx="3" fill="url(#progressGrad)"/>
    <text x="38" y="134" fill="#94a3b8" font-size="7" font-family="Inter,sans-serif">Study Progress · 70%</text>
    <!-- Mini cards row -->
    <rect x="38" y="144" width="64" height="52" rx="10" fill="#1e293b"/>
    <text x="70" y="168" text-anchor="middle" fill="white" font-size="14" font-family="Inter,sans-serif">📚</text>
    <rect x="38" y="188" width="40" height="4" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="112" y="144" width="64" height="52" rx="10" fill="#1e293b"/>
    <text x="144" y="168" text-anchor="middle" fill="white" font-size="14" font-family="Inter,sans-serif">🧮</text>
    <rect x="112" y="188" width="40" height="4" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="186" y="144" width="64" height="52" rx="10" fill="#1e293b"/>
    <text x="218" y="168" text-anchor="middle" fill="white" font-size="14" font-family="Inter,sans-serif">✍️</text>
    <rect x="186" y="188" width="40" height="4" rx="2" fill="#64748b" opacity="0.5"/>
  </g>

  <!-- Floating notification -->
  <g transform="translate(270,330)">
    <rect width="150" height="52" rx="14" fill="#0f172a"/>
    <rect width="150" height="52" rx="14" stroke="#10b981" stroke-opacity="0.4" stroke-width="1" fill="none"/>
    <circle cx="20" cy="26" r="10" fill="#10b981" opacity="0.2"/>
    <text x="20" y="30" text-anchor="middle" font-size="10">✅</text>
    <rect x="38" y="14" width="96" height="5" rx="2.5" fill="#10b981" opacity="0.7"/>
    <rect x="38" y="25" width="70" height="4" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="38" y="35" width="55" height="4" rx="2" fill="#64748b" opacity="0.3"/>
  </g>

  <!-- Stars scattered -->
  <text x="60" y="440" font-size="12" opacity="0.4">⭐</text>
  <text x="400" y="200" font-size="10" opacity="0.3">✨</text>
  <text x="30" y="300" font-size="8" opacity="0.3">💫</text>
  <text x="430" y="380" font-size="10" opacity="0.35">⭐</text>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="deviceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
